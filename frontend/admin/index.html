<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宏伟宝库 · 管理端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       Design Tokens — Dark Theme (default)
       ══════════════════════════════════════════ */
    :root {
      --bg-deepest: #151310;
      --bg-deep: #1c1a16;
      --bg-surface: #24211c;
      --bg-elevated: #2d2922;
      --bg-highlight: #37312a;
      --bg-input: #1d1a16;

      --gold: #b89342;
      --gold-light: #c9a54e;
      --gold-bright: #ddc078;
      --gold-dim: #6b5a32;
      --gold-dark: #3d3018;

      --crimson: #843434;
      --crimson-light: #a84444;
      --danger: #b84040;
      --danger-hover: #d45050;

      --text-primary: #cec4b0;
      --text-secondary: #a29684;
      --text-muted: #969080;
      --text-dim: #716856;

      --border-subtle: rgba(255,255,255,0.04);
      --border-input: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.08);
      --border-medium: rgba(255,255,255,0.12);
      --border-gold: rgba(184,147,66,0.1);
      --border-gold-strong: rgba(184,147,66,0.15);
      --border-danger: rgba(184,64,64,0.2);
      --overlay-bg: rgba(0,0,0,0.55);
      --divider: rgba(255,255,255,0.05);

      --font-display: 'Cinzel', 'Noto Serif SC', 'Source Han Serif SC', serif;
      --font-body: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', system-ui, sans-serif;

      --radius-sm: 3px;
      --radius-md: 6px;
      --radius-lg: 10px;

      --transition-fast: 0.15s ease;
      --transition-base: 0.25s ease;
    }

    /* ══════════════════════════════════════════
       Light Theme
       ══════════════════════════════════════════ */
    [data-theme="light"] {
      --bg-deepest: #e5e0d7;
      --bg-deep: #dbd5ca;
      --bg-surface: #ece7dc;
      --bg-elevated: #e3ded4;
      --bg-highlight: #dad4c8;
      --bg-input: #e2ddd2;

      --gold: #9a6e22;
      --gold-light: #b08028;
      --gold-bright: #c09030;
      --gold-dim: #8a6e30;
      --gold-dark: #ddd0a8;

      --crimson: #8a3030;
      --crimson-light: #a04040;
      --danger: #b04040;
      --danger-hover: #c85050;

      --text-primary: #3c3020;
      --text-secondary: #5a4a32;
      --text-muted: #726452;
      --text-dim: #8c7a64;

      --border-subtle: rgba(0,0,0,0.06);
      --border-input: rgba(0,0,0,0.10);
      --border-hover: rgba(0,0,0,0.12);
      --border-medium: rgba(0,0,0,0.15);
      --border-gold: rgba(154,110,34,0.12);
      --border-gold-strong: rgba(154,110,34,0.2);
      --border-danger: rgba(180,60,60,0.2);
      --overlay-bg: rgba(0,0,0,0.2);
      --divider: rgba(0,0,0,0.08);
    }

    /* ══════════════════════════════════════════
       Reset
       ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deepest);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      transition: opacity 0.5s ease;
    }
    [data-theme="light"] body::before { opacity: 0.018; }

    /* ══════════════════════════════════════════
       Login Screen
       ══════════════════════════════════════════ */
    .login-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-deepest);
    }
    .login-screen.hidden { display: none; }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 380px; max-width: 90vw;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    [data-theme="light"] .login-card { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .login-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.7; }
    .login-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .login-error { font-size: 12px; color: var(--danger); margin-bottom: 14px; min-height: 18px; }

    .field { margin-bottom: 16px; text-align: left; }
    .field-label {
      display: block;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em; margin-bottom: 6px;
      font-family: var(--font-display); text-transform: uppercase;
    }

    .input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-family: var(--font-body); font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .input::placeholder { color: var(--text-dim); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: var(--radius-md);
      font-family: var(--font-body); font-size: 13px;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .btn--gold {
      background: linear-gradient(to bottom, rgba(184,147,66,0.2), rgba(184,147,66,0.1));
      color: var(--gold-light);
      border-color: rgba(184,147,66,0.3);
    }
    .btn--gold:hover {
      background: linear-gradient(to bottom, rgba(184,147,66,0.3), rgba(184,147,66,0.18));
      border-color: var(--gold);
    }
    .btn--gold:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border-hover);
    }
    .btn--ghost:hover { color: var(--text-primary); border-color: var(--border-medium); }
    .btn--danger {
      background: rgba(184,64,64,0.1);
      color: var(--danger);
      border-color: var(--border-danger);
    }
    .btn--danger:hover { background: rgba(184,64,64,0.2); border-color: var(--danger-hover); color: var(--danger-hover); }
    .btn--sm { padding: 5px 12px; font-size: 12px; }
    .btn-block { width: 100%; }

    /* 主题切换按钮 */
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition-fast);
      flex-shrink: 0;
      line-height: 1;
    }
    .theme-toggle:hover { border-color: var(--gold-dim); color: var(--gold-light); }
    .theme-toggle:active { transform: scale(0.92); }

    /* ══════════════════════════════════════════
       Dashboard
       ══════════════════════════════════════════ */
    .dashboard {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .dashboard.hidden { display: none; }

    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--divider);
    }
    .dash-title {
      font-family: var(--font-display);
      font-size: 18px; color: var(--gold-light);
      letter-spacing: 0.06em;
    }
    .dash-actions { display: flex; gap: 10px; align-items: center; }

    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-list-header {
      display: grid;
      grid-template-columns: 60px 1fr 140px 200px 120px;
      gap: 12px; padding: 10px 16px;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em;
      font-family: var(--font-display); text-transform: uppercase;
    }
    .entry-row {
      display: grid;
      grid-template-columns: 60px 1fr 140px 200px 120px;
      gap: 12px; align-items: center;
      padding: 10px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .entry-row:hover {
      border-color: rgba(184,147,66,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    [data-theme="light"] .entry-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .entry-row-cover {
      width: 44px; height: 58px;
      border-radius: 2px; overflow: hidden;
      background: var(--bg-deep);
      flex-shrink: 0;
    }
    .entry-row-cover img { width: 100%; height: 100%; object-fit: cover; }
    .entry-row-cover .no-cover {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-dim);
    }
    .entry-row-title {
      font-weight: 600; font-size: 14px; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-row-author { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .entry-row-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .entry-row-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 2px;
      background: rgba(184,147,66,0.08);
      color: var(--gold-light);
      border: 1px solid rgba(184,147,66,0.12);
    }
    .entry-row-rec { font-size: 11px; color: var(--crimson-light); font-family: var(--font-display); }
    .entry-row-rec.yes { color: var(--gold-light); }
    .entry-row-actions { display: flex; gap: 6px; justify-content: flex-end; }

    .empty-list { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; }

    .loading-spin { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .loading-spin::before {
      content: '';
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--text-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       Form Modal
       ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--overlay-bg);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 40px;
      overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-gold-strong);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 64px rgba(0,0,0,0.7);
      width: 600px; max-width: 94vw;
      margin-bottom: 60px;
      transform: translateY(8px);
      transition: transform 0.3s ease;
    }
    [data-theme="light"] .modal { box-shadow: 0 12px 48px rgba(0,0,0,0.12); }
    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--divider);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 16px; letter-spacing: 0.04em;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 22px;
      cursor: pointer; padding: 2px 8px; border-radius: var(--radius-sm);
      transition: color var(--transition-fast); line-height: 1;
    }
    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 24px;
      display: flex; flex-direction: column; gap: 18px;
      max-height: 70vh; overflow-y: auto;
    }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 24px;
      border-top: 1px solid var(--divider);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.06em;
      font-family: var(--font-display);
    }
    .form-label .required { color: var(--crimson-light); }

    .textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      font-family: var(--font-body); font-size: 13px;
      color: var(--text-primary);
      outline: none; resize: vertical; min-height: 70px; line-height: 1.5;
      transition: border-color var(--transition-fast);
    }
    .textarea:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .form-hint { font-size: 11px; color: var(--text-dim); }

    /* Chip 输入 */
    .chip-input-wrap {
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 6px 8px;
      min-height: 40px;
      cursor: text;
      transition: border-color var(--transition-fast);
    }
    .chip-input-wrap:focus-within {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(184,147,66,0.1);
      border: 1px solid rgba(184,147,66,0.18);
      border-radius: 14px;
      padding: 2px 10px;
      font-size: 12px; color: var(--gold-light);
      animation: chipPop 0.15s ease;
    }
    .chip-remove {
      background: none; border: none;
      color: var(--gold-dim); font-size: 14px;
      cursor: pointer; padding: 0; line-height: 1;
      transition: color var(--transition-fast);
    }
    .chip-remove:hover { color: var(--crimson-light); }
    .chip-input {
      flex: 1; min-width: 80px;
      background: transparent; border: none; outline: none;
      font-family: var(--font-body); font-size: 13px;
      color: var(--text-primary);
      padding: 3px 4px;
    }
    .chip-input::placeholder { color: var(--text-dim); font-size: 12px; }

    @keyframes chipPop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* 封面上传 */
    .cover-upload-area { display: flex; gap: 16px; align-items: flex-start; }
    .cover-preview {
      width: 100px; height: 133px;
      border-radius: var(--radius-sm);
      background: var(--bg-deep);
      border: 1px dashed var(--border-hover);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
    .cover-preview-placeholder { font-size: 28px; color: var(--text-dim); }
    .cover-upload-controls { display: flex; flex-direction: column; gap: 8px; }
    .cover-upload-controls .input[type="file"] { font-size: 12px; padding: 6px; }
    .cover-upload-status { font-size: 11px; color: var(--text-muted); }
    .cover-upload-status.success { color: #6a9; }
    .cover-upload-status.error { color: var(--danger); }

    /* 裁剪器 */
    .cropper-panel {
      display: none;
      margin-top: 10px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .cropper-panel.active { display: flex; }
    .cropper-main {
      position: relative;
      width: 360px; height: 480px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: move;
      user-select: none;
      background: var(--bg-deep);
      flex-shrink: 0;
      line-height: 0;
    }
    .cropper-main canvas { display: block; width: 100%; height: 100%; }
    .cropper-actions {
      display: flex; gap: 8px; align-items: center;
    }
    .cropper-hint {
      font-size: 11px; color: var(--text-dim);
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-elevated);
      border: 1px solid rgba(184,147,66,0.2);
      border-radius: var(--radius-md);
      padding: 10px 20px;
      font-size: 13px; color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: all 0.3s ease;
    }
    [data-theme="light"] .toast { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--border-danger); color: var(--danger-hover); }

    /* 确认对话框 */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .confirm-overlay.visible { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-danger);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    [data-theme="light"] .confirm-box { box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .confirm-text { font-size: 14px; margin-bottom: 20px; color: var(--text-primary); }
    .confirm-actions { display: flex; justify-content: center; gap: 10px; }

    /* ══════════════════════════════════════════
       Scrollbar
       ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ══════════════════════════════════════════
       Tabs
       ══════════════════════════════════════════ */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border-medium);
      padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 14px; cursor: pointer;
      transition: all var(--transition-fast);
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--gold); border-bottom-color: var(--gold);
    }
    .tab-badge {
      display: inline-block; margin-left: 6px;
      padding: 1px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      background: var(--gold-dark); color: var(--gold-bright);
    }
    .tab-badge.zero { background: transparent; color: var(--text-muted); }
    .submission-list { display: none; }
    .submission-list.visible { display: block; }

    /* ── 操作按钮 ── */
    .action-btn-group { display: flex; gap: 6px; }
    .btn--success {
      background: var(--gold-dark); color: var(--gold-bright);
      border-color: var(--border-gold);
    }
    .btn--success:hover { background: var(--gold-dim); }
  </style>
</head>
<body>

  <!-- 登录页 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon" aria-hidden="true">&#9876;</div>
      <div class="login-title">宏伟宝库 · 管理端</div>
      <div class="login-subtitle">管理入口 — 输入口令以继续</div>
      <div class="login-error" id="loginError"></div>
      <div class="field">
        <label class="field-label" for="passwordInput">访问口令</label>
        <input type="password" id="passwordInput" class="input" placeholder="输入管理口令…" autocomplete="current-password">
      </div>
      <button class="btn btn--gold btn-block" id="loginBtn">进入管理</button>
    </div>
  </div>

  <!-- 管理面板 -->
  <div class="dashboard hidden" id="dashboard">
    <header class="dash-header">
      <span class="dash-title">&#9876; 条目管理</span>
      <div class="dash-actions">
        <button class="btn btn--ghost" id="exportBtn">导出 JSON</button>
        <button class="btn btn--ghost" id="importBtn">导入 JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button class="btn btn--gold" id="newEntryBtn">+ 新建条目</button>
        <button class="btn btn--ghost" id="logoutBtn">退出</button>
        <button class="theme-toggle" id="themeToggle" aria-label="切换亮色/暗色主题" title="切换主题">&#9788;</button>
      </div>
    </header>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" id="tabEntries">已发布 <span class="tab-badge zero" id="entryBadge">0</span></button>
      <button class="tab-btn" id="tabSubmissions">待审核 <span class="tab-badge zero" id="submissionBadge">0</span></button>
    </div>

    <div class="entry-list-header" id="entryListHeader">
      <span>封面</span><span>标题 / 作者</span><span>标签</span><span>链接</span><span style="text-align:right">操作</span>
    </div>
    <div class="entry-list" id="entryList">
      <div class="loading-spin">加载条目数据…</div>
    </div>

    <div class="entry-list-header" id="submissionListHeader" style="display:none">
      <span>封面</span><span>标题 / 作者</span><span>标签</span><span>链接</span><span style="text-align:right">操作</span>
    </div>
    <div class="entry-list submission-list" id="submissionList">
      <div class="loading-spin">加载投稿数据…</div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="entryModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="entryModalTitle">新建条目</span>
        <button class="modal-close" id="entryModalClose">&times;</button>
      </div>
      <div class="modal-body" id="entryModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="entryModalCancel">取消</button>
        <button class="btn btn--gold" id="entryModalSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认删除 -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-text" id="confirmText">确定要删除此条目吗？此操作不可恢复。</div>
      <div class="confirm-actions">
        <button class="btn btn--ghost" id="confirmCancel">取消</button>
        <button class="btn btn--danger" id="confirmOk">确认删除</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

    /* ── 主题管理 ── */
    const THEME_KEY = 'dh-marketplace-theme'; // 与前台共享

    function getSavedTheme() { try { return localStorage.getItem(THEME_KEY); } catch { return null; } }
    function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch {} }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = t === 'light' ? '&#9790;' : '&#9788;';
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      applyTheme(next); saveTheme(next);
    }
    (function initTheme() {
      const saved = getSavedTheme();
      if (saved) applyTheme(saved);
      document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
    })();

    /* ── DOM ── */
    const $ = (s) => document.querySelector(s);

    const loginScreen = $('#loginScreen');
    const dashboard = $('#dashboard');
    const loginError = $('#loginError');
    const passwordInput = $('#passwordInput');
    const loginBtn = $('#loginBtn');
    const entryList = $('#entryList');
    const newEntryBtn = $('#newEntryBtn');
    const logoutBtn = $('#logoutBtn');
    const entryModal = $('#entryModal');
    const entryModalTitle = $('#entryModalTitle');
    const entryModalBody = $('#entryModalBody');
    const entryModalClose = $('#entryModalClose');
    const entryModalCancel = $('#entryModalCancel');
    const entryModalSave = $('#entryModalSave');
    const confirmOverlay = $('#confirmOverlay');
    const confirmText = $('#confirmText');
    const confirmCancel = $('#confirmCancel');
    const confirmOk = $('#confirmOk');
    const toast = $('#toast');

    let entries = [];
    let editingId = null;
    let pendingDeleteId = null;
    let formCoverPath = '';

    /* ── API ── */
    async function api(path, opts = {}) {
      const url = API_BASE + path;
      const res = await fetch(url, {
        credentials: 'include',
        headers: opts.body instanceof FormData
          ? {} : { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        ...opts,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg, type = '') {
      toast.textContent = msg;
      toast.className = 'toast visible ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 2800);
    }

    async function checkSession() {
      try { return (await api('/api/admin/session')).authenticated === true; }
      catch { return false; }
    }

    async function doLogin() {
      const pw = passwordInput.value;
      if (!pw) { loginError.textContent = '请输入口令'; return; }
      loginBtn.disabled = true;
      loginError.textContent = '';
      try {
        await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
        showDashboard();
      } catch (err) { loginError.textContent = err.message; }
      finally { loginBtn.disabled = false; }
    }

    async function showDashboard() {
      loginScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      activeTab = 'entries';
      setTab('entries');
      await loadEntries();
      loadSubmissionCount();
    }

    function updateEntryBadge() {
      var n = entries.length;
      entryBadge.textContent = n;
      entryBadge.classList.toggle('zero', n === 0);
    }

    async function loadSubmissionCount() {
      try {
        var data = await api('/api/admin/submissions');
        submissions = data.submissions || [];
        updateSubmissionBadge();
      } catch (err) {
        // 静默失败——计数非关键
      }
    }

    async function loadEntries() {
      entryList.innerHTML = '<div class="loading-spin">加载条目数据…</div>';
      try {
        const data = await api('/api/admin/entries');
        entries = data.entries || [];
        renderEntryList();
      } catch (err) {
        entryList.innerHTML = `<div class="empty-list">加载失败：${escHtml(err.message)}</div>`;
      }
    }

    function renderEntryList() {
      if (!entries.length) {
        entryList.innerHTML = '<div class="empty-list">暂无条目，点击「新建条目」添加第一个资源</div>';
        return;
      }
      entries.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      entryList.innerHTML = entries.map(e => {
        const rec = e.recommendValue > 0;
        const thumb = e.coverPath
          ? `<img src="${escAttr(e.coverPath)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="no-cover" style="display:none">&#9876;</span>`
          : '<span class="no-cover">&#9876;</span>';
        return `
        <div class="entry-row">
          <div class="entry-row-cover">${thumb}</div>
          <div>
            <div class="entry-row-title">${escHtml(e.title)}</div>
            <div class="entry-row-author">${escHtml(e.author)}</div>
          </div>
          <div class="entry-row-tags">
            ${(e.contentTags||[]).slice(0,3).map(t=>`<span class="entry-row-tag">${escHtml(t)}</span>`).join('')}
            ${(e.contentTags||[]).length>3?`<span class="entry-row-tag">+${e.contentTags.length-3}</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escAttr(e.targetUrl)}">
            ${rec?'<span class="entry-row-rec yes">&#9733; 推荐 &nbsp;</span>':''}
            ${escHtml(e.targetUrl.replace(/^https?:\/\//,'').substring(0,35))}
          </div>
          <div class="entry-row-actions">
            <button class="btn btn--ghost btn--sm edit-btn" data-id="${escAttr(e.id)}">编辑</button>
            <button class="btn btn--danger btn--sm delete-btn" data-id="${escAttr(e.id)}">删除</button>
          </div>
        </div>`;
      }).join('');

      entryList.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => openEditor(b.dataset.id)));
      entryList.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', () => confirmDelete(b.dataset.id)));
      updateEntryBadge();
    }

    /* ── 审核系统 ── */
    const tabEntries = document.getElementById('tabEntries');
    const tabSubmissions = document.getElementById('tabSubmissions');
    const entryBadge = document.getElementById('entryBadge');
    const submissionBadge = document.getElementById('submissionBadge');
    const submissionListEl = document.getElementById('submissionList');
    const submissionListHeader = document.getElementById('submissionListHeader');
    const entryListHeader = document.getElementById('entryListHeader');

    let submissions = [];
    let activeTab = 'entries';        // 'entries' | 'submissions'
    let editingSubmissionId = null;   // 当前正在编辑的投稿 id

    function setTab(tab) {
      activeTab = tab;
      if (tab === 'entries') {
        tabEntries.classList.add('active');
        tabSubmissions.classList.remove('active');
        entryListHeader.style.display = '';
        entryList.style.display = '';
        submissionListHeader.style.display = 'none';
        submissionListEl.classList.remove('visible');
      } else {
        tabEntries.classList.remove('active');
        tabSubmissions.classList.add('active');
        entryListHeader.style.display = 'none';
        entryList.style.display = 'none';
        submissionListHeader.style.display = '';
        submissionListEl.classList.add('visible');
        loadSubmissions();
      }
    }

    tabEntries.addEventListener('click', function () { setTab('entries'); });
    tabSubmissions.addEventListener('click', function () { setTab('submissions'); });

    function updateSubmissionBadge() {
      var n = submissions.length;
      submissionBadge.textContent = n;
      if (n === 0) {
        submissionBadge.classList.add('zero');
      } else {
        submissionBadge.classList.remove('zero');
      }
    }

    async function loadSubmissions() {
      submissionListEl.innerHTML = '<div class="loading-spin">加载投稿数据…</div>';
      try {
        var data = await api('/api/admin/submissions');
        submissions = data.submissions || [];
        renderSubmissionList();
        updateSubmissionBadge();
      } catch (err) {
        submissionListEl.innerHTML = '<div class="empty-list">加载失败：' + escHtml(err.message) + '</div>';
      }
    }

    function renderSubmissionList() {
      if (!submissions.length) {
        submissionListEl.innerHTML = '<div class="empty-list">暂无待审核的投稿</div>';
        return;
      }
      submissions.sort(function (a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); });
      submissionListEl.innerHTML = submissions.map(function (s) {
        var thumb = s.coverPath
          ? '<img src="' + escAttr(s.coverPath) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><span class="no-cover" style="display:none">&#9876;</span>'
          : '<span class="no-cover">&#9876;</span>';
        return '<div class="entry-row">'
          + '<div class="entry-row-cover">' + thumb + '</div>'
          + '<div><div class="entry-row-title">' + escHtml(s.title) + '</div>'
          + '<div class="entry-row-author">' + escHtml(s.author) + '</div></div>'
          + '<div class="entry-row-tags">'
          + (s.contentTags || []).slice(0, 3).map(function (t) { return '<span class="entry-row-tag">' + escHtml(t) + '</span>'; }).join('')
          + ((s.contentTags || []).length > 3 ? '<span class="entry-row-tag">+' + (s.contentTags.length - 3) + '</span>' : '')
          + '</div>'
          + '<div style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + escAttr(s.targetUrl) + '">'
          + escHtml(s.targetUrl.replace(/^https?:\/\//, '').substring(0, 35))
          + '</div>'
          + '<div class="entry-row-actions">'
          + '<div class="action-btn-group">'
          + '<button class="btn btn--ghost btn--sm sub-edit-btn" data-id="' + escAttr(s.id) + '">编辑</button>'
          + '<button class="btn btn--success btn--sm sub-approve-btn" data-id="' + escAttr(s.id) + '">通过</button>'
          + '<button class="btn btn--danger btn--sm sub-reject-btn" data-id="' + escAttr(s.id) + '">驳回</button>'
          + '</div></div>'
          + '</div>';
      }).join('');

      submissionListEl.querySelectorAll('.sub-edit-btn').forEach(function (b) {
        b.addEventListener('click', function () { openSubmissionEditor(b.dataset.id); });
      });
      submissionListEl.querySelectorAll('.sub-approve-btn').forEach(function (b) {
        b.addEventListener('click', function () { approveSubmission(b.dataset.id); });
      });
      submissionListEl.querySelectorAll('.sub-reject-btn').forEach(function (b) {
        b.addEventListener('click', function () { rejectSubmission(b.dataset.id); });
      });
    }

    /* ── 投稿编辑弹窗（复用现有 modal） ── */
    function openSubmissionEditor(id) {
      editingSubmissionId = id;
      editingId = null;  // 不是编辑条目
      formCoverPath = '';
      var s = submissions.find(function (x) { return x.id === id; });
      if (!s) return;

      entryModalTitle.textContent = '编辑投稿';
      formCoverPath = s.coverPath || '';

      entryModalBody.innerHTML = ''
        + '<div class="form-group full">'
        + '<span class="form-label">封面图片</span>'
        + '<div class="cover-upload-area">'
        + '<div class="cover-preview" id="coverPreview">'
        + (formCoverPath
          ? '<img src="' + escAttr(formCoverPath) + '" alt="封面预览" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'"><span class="cover-preview-placeholder" ' + (formCoverPath ? 'style="display:none"' : '') + '>&#9876;</span>'
          : '<span class="cover-preview-placeholder">&#9876;</span>')
        + '</div>'
        + '<div class="cover-upload-controls">'
        + '<input type="file" class="input" id="coverFileInput" accept="image/png,image/jpeg,image/webp,image/gif">'
        + '<div class="cropper-panel" id="cropperPanel">'
        + '<div class="cropper-main" id="cropperMain"><canvas id="cropperCanvas"></canvas></div>'
        + '<div class="cropper-actions">'
        + '<span class="cropper-hint">拖拽移动 · 滚轮缩放</span>'
        + '<button class="btn btn--gold btn--sm" id="cropperCropBtn" type="button">确认裁剪</button>'
        + '<button class="btn btn--ghost btn--sm" id="cropperCancelBtn" type="button">取消</button>'
        + '</div></div>'
        + '<span class="cover-upload-status" id="coverUploadStatus"></span>'
        + '</div></div></div>'
        + '<div class="form-group">'
        + '<span class="form-label"><span class="required">*</span> 标题</span>'
        + '<input class="input" id="formTitle" value="' + escAttr(s.title || '') + '" placeholder="资源标题">'
        + '</div>'
        + '<div class="form-group">'
        + '<span class="form-label">作者</span>'
        + '<input class="input" id="formAuthor" value="' + escAttr(s.author || '') + '" placeholder="制作者署名">'
        + '</div>'
        + '<div class="form-group">'
        + '<span class="form-label">内容标签 <span class="form-hint">— Enter 添加</span></span>'
        + '<div class="chip-input-wrap" id="chipContentTags">'
        + (s.contentTags || []).map(function (t) { return '<span class="chip">' + escHtml(t) + '<span class="chip-remove" role="button" tabindex="0">&times;</span></span>'; }).join('')
        + '<input class="chip-input" placeholder="输入标签…">'
        + '</div></div>'
        + '<div class="form-group">'
        + '<span class="form-label">风味标签 <span class="form-hint">— Enter 添加</span></span>'
        + '<div class="chip-input-wrap" id="chipFlavorTags">'
        + (s.flavorTags || []).map(function (t) { return '<span class="chip">' + escHtml(t) + '<span class="chip-remove" role="button" tabindex="0">&times;</span></span>'; }).join('')
        + '<input class="chip-input" placeholder="输入标签…">'
        + '</div></div>'
        + '<div class="form-group">'
        + '<span class="form-label">推荐值</span>'
        + '<input class="input" id="formRecValue" type="number" min="0" value="' + (s.recommendValue || 0) + '" placeholder="0">'
        + '</div>'
        + '<div class="form-group">'
        + '<span class="form-label"><span class="required">*</span> 跳转链接</span>'
        + '<input class="input" id="formTargetUrl" value="' + escAttr(s.targetUrl || '') + '" placeholder="https://…">'
        + '</div>'
        + '<div class="form-group full">'
        + '<span class="form-label">简介 <span class="form-hint">— 可选，悬停卡片时显示</span></span>'
        + '<textarea class="textarea" id="formSummary" placeholder="简介…">' + escHtml(s.summary || '') + '</textarea>'
        + '</div>';

      bindChipInput('chipContentTags');
      bindChipInput('chipFlavorTags');

      // 裁剪器（复用现有逻辑）
      setupCropper();

      entryModal.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    /* ── 保存投稿编辑 ── */
    var origSaveHandler = null;
    entryModalSave.addEventListener('click', function saveHandler(e) {
      if (editingSubmissionId) {
        e.stopImmediatePropagation();
        saveSubmissionEdit();
      }
      // 否则由原来的 saveEntry 处理
    }, true);

    async function saveSubmissionEdit() {
      var title = (document.getElementById('formTitle')?.value || '').trim();
      var author = (document.getElementById('formAuthor')?.value || '').trim();
      var cTags = getChipVals('chipContentTags');
      var fTags = getChipVals('chipFlavorTags');
      var recVal = parseInt(document.getElementById('formRecValue')?.value || '0', 10) || 0;
      var targetUrl = (document.getElementById('formTargetUrl')?.value || '').trim();
      var summary = (document.getElementById('formSummary')?.value || '').trim();

      if (!title) { showToast('标题不能为空', 'error'); return; }
      if (!targetUrl) { showToast('跳转链接不能为空', 'error'); return; }

      var body = {
        title: title, author: author,
        contentTags: cTags, flavorTags: fTags,
        recommendValue: recVal, summary: summary,
        targetUrl: targetUrl, coverPath: formCoverPath,
      };

      entryModalSave.disabled = true;
      try {
        await api('/api/admin/submissions/' + editingSubmissionId, { method: 'PUT', body: JSON.stringify(body) });
        showToast('投稿已更新');
        closeEditor();
        editingSubmissionId = null;
        await loadSubmissions();
      } catch (err) { showToast(err.message, 'error'); }
      finally { entryModalSave.disabled = false; }
    }

    /* ── 通过 / 驳回 ── */
    async function approveSubmission(id) {
      var s = submissions.find(function (x) { return x.id === id; });
      if (!s) return;
      try {
        await api('/api/admin/submissions/' + id + '/approve', { method: 'POST' });
        showToast('已通过「' + s.title + '」');
        submissions = submissions.filter(function (x) { return x.id !== id; });
        renderSubmissionList();
        updateSubmissionBadge();
        // 同时刷新条目列表
        entries = [];
        await loadEntries();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function rejectSubmission(id) {
      var s = submissions.find(function (x) { return x.id === id; });
      if (!s) return;
      pendingDeleteId = id;
      confirmText.textContent = '确定要驳回「' + (s.title || id) + '」吗？此操作不可恢复。';
      confirmOverlay.classList.add('visible');
    }

    /* ── 裁剪器初始化提取 ── */
    function setupCropper() {
      var cropperPanel = document.getElementById('cropperPanel');
      var cropperCanvas = document.getElementById('cropperCanvas');
      var cropperCtx = cropperCanvas.getContext('2d');
      var cropperMain = document.getElementById('cropperMain');
      var coverUploadStatus = document.getElementById('coverUploadStatus');

      var OUT_W = 600, OUT_H = 800;
      var CANVAS_W = 360, CANVAS_H = 480;
      cropperCanvas.width = CANVAS_W;
      cropperCanvas.height = CANVAS_H;

      var cropImg = null, cropScale = 1, cropIW = 0, cropIH = 0, cropOX = 0, cropOY = 0;
      var cropX = 0, cropY = 0, cropW = 0, cropH = 0;
      var dragging = false, dragStartX, dragStartY, dragStartCX, dragStartCY;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function drawCropper() {
        if (!cropImg) return;
        var ctx = cropperCtx;
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.drawImage(cropImg, cropOX, cropOY, cropIW, cropIH);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.save();
        ctx.beginPath();
        ctx.rect(cropX, cropY, cropW, cropH);
        ctx.clip();
        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.drawImage(cropImg, cropOX, cropOY, cropIW, cropIH);
        ctx.restore();
        ctx.strokeStyle = '#ddc078'; ctx.lineWidth = 2;
        ctx.strokeRect(cropX, cropY, cropW, cropH);
        ctx.fillStyle = '#ddc078'; var cs = 8;
        ctx.fillRect(cropX, cropY, cs, cs);
        ctx.fillRect(cropX + cropW - cs, cropY, cs, cs);
        ctx.fillRect(cropX, cropY + cropH - cs, cs, cs);
        ctx.fillRect(cropX + cropW - cs, cropY + cropH - cs, cs, cs);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(cropX + cropW / 3, cropY); ctx.lineTo(cropX + cropW / 3, cropY + cropH);
        ctx.moveTo(cropX + cropW * 2 / 3, cropY); ctx.lineTo(cropX + cropW * 2 / 3, cropY + cropH);
        ctx.moveTo(cropX, cropY + cropH / 3); ctx.lineTo(cropX + cropW, cropY + cropH / 3);
        ctx.moveTo(cropX, cropY + cropH * 2 / 3); ctx.lineTo(cropX + cropW, cropY + cropH * 2 / 3);
        ctx.stroke();
      }
      function initCropBox() {
        cropH = cropIH * 0.9;
        cropW = cropH * 0.75;
        if (cropW > cropIW) { cropW = cropIW; cropH = cropW / 0.75; }
        cropX = cropOX + (cropIW - cropW) / 2;
        cropY = cropOY + (cropIH - cropH) / 2;
        drawCropper();
      }
      function applyZoom(ratio, cx, cy) {
        var newH = clamp(cropH * ratio, 60, cropIH);
        var newW = newH * 0.75;
        var kx = cx !== undefined ? cx : cropX + cropW / 2;
        var ky = cy !== undefined ? cy : cropY + cropH / 2;
        var scale = newW / cropW;
        cropW = newW; cropH = newH;
        cropX = clamp(kx - (kx - cropX) * scale, cropOX, cropOX + cropIW - cropW);
        cropY = clamp(ky - (ky - cropY) * scale, cropOY, cropOY + cropIH - cropH);
        drawCropper();
      }

      document.getElementById('coverFileInput').addEventListener('change', function () {
        var file = document.getElementById('coverFileInput').files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
          cropImg = new Image();
          cropImg.onload = function () {
            var scaleW = CANVAS_W / cropImg.width;
            var scaleH = CANVAS_H / cropImg.height;
            cropScale = Math.min(scaleW, scaleH);
            cropIW = cropImg.width * cropScale;
            cropIH = cropImg.height * cropScale;
            cropOX = (CANVAS_W - cropIW) / 2;
            cropOY = (CANVAS_H - cropIH) / 2;
            initCropBox();
            cropperPanel.classList.add('active');
          };
          cropImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });

      cropperMain.addEventListener('wheel', function (e) {
        if (!cropImg) return;
        e.preventDefault();
        var rect = cropperMain.getBoundingClientRect();
        var mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        var my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        applyZoom(e.deltaY < 0 ? 1.1 : 0.9, mx, my);
      }, { passive: false });

      cropperMain.addEventListener('mousedown', function (e) {
        if (!cropImg) return;
        var rect = cropperMain.getBoundingClientRect();
        var mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        var my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        if (mx >= cropX && mx <= cropX + cropW && my >= cropY && my <= cropY + cropH) {
          dragging = true;
          dragStartX = mx; dragStartY = my;
          dragStartCX = cropX; dragStartCY = cropY;
          e.preventDefault();
        }
      });
      window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        var rect = cropperMain.getBoundingClientRect();
        var mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        var my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        cropX = clamp(dragStartCX + (mx - dragStartX), cropOX, cropOX + cropIW - cropW);
        cropY = clamp(dragStartCY + (my - dragStartY), cropOY, cropOY + cropIH - cropH);
        drawCropper();
      });
      window.addEventListener('mouseup', function () { dragging = false; });

      document.getElementById('cropperCropBtn').addEventListener('click', function () {
        if (!cropImg) return;
        var outCanvas = document.createElement('canvas');
        outCanvas.width = OUT_W; outCanvas.height = OUT_H;
        var octx = outCanvas.getContext('2d');
        var sx = (cropX - cropOX) / cropScale;
        var sy = (cropY - cropOY) / cropScale;
        var sw = cropW / cropScale;
        var sh = cropH / cropScale;
        octx.drawImage(cropImg, sx, sy, sw, sh, 0, 0, OUT_W, OUT_H);

        coverUploadStatus.textContent = '上传中…';
        coverUploadStatus.className = 'cover-upload-status';
        outCanvas.toBlob(function (blob) {
          var fd = new FormData();
          fd.append('file', blob, 'cover.webp');

          // 提交投稿编辑时用管理员上传接口，封面进正式目录
          var uploadUrl = editingSubmissionId ? '/api/admin/covers' : '/api/public/covers';
          api(uploadUrl, { method: 'POST', body: fd })
            .then(function (data) {
              formCoverPath = data.coverPath;
              document.getElementById('coverPreview').innerHTML = '<img src="' + formCoverPath + '" alt="封面预览">';
              coverUploadStatus.textContent = '上传成功';
              coverUploadStatus.className = 'cover-upload-status success';
              cropImg = null;
              cropperPanel.classList.remove('active');
              document.getElementById('coverFileInput').value = '';
            })
            .catch(function (err) {
              coverUploadStatus.textContent = err.message;
              coverUploadStatus.className = 'cover-upload-status error';
            });
        }, 'image/webp', 0.85);
      });

      document.getElementById('cropperCancelBtn').addEventListener('click', function () {
        cropImg = null;
        cropperPanel.classList.remove('active');
        document.getElementById('coverFileInput').value = '';
        cropperCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      });
    }

    /* ── 编辑弹窗 ── */
    function openEditor(id) {
      editingId = id;
      formCoverPath = '';
      const entry = id ? entries.find(e => e.id === id) : null;
      entryModalTitle.textContent = id ? '编辑条目' : '新建条目';

      const title = entry?.title || '';
      const author = entry?.author || '';
      const summary = entry?.summary || '';
      const targetUrl = entry?.targetUrl || '';
      const recVal = entry?.recommendValue ?? 0;
      const cTags = entry?.contentTags || [];
      const fTags = entry?.flavorTags || [];
      const existingCover = entry?.coverPath || '';
      if (existingCover) formCoverPath = existingCover;

      entryModalBody.innerHTML = `
        <div class="form-group full">
          <span class="form-label">封面图片</span>
          <div class="cover-upload-area">
            <div class="cover-preview" id="coverPreview">
              ${formCoverPath
                ? `<img src="${escAttr(formCoverPath)}" alt="封面预览" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="cover-preview-placeholder" ${formCoverPath?'style="display:none"':''}>&#9876;</span>`
                : '<span class="cover-preview-placeholder">&#9876;</span>'}
            </div>
            <div class="cover-upload-controls">
              <input type="file" class="input" id="coverFileInput" accept="image/png,image/jpeg,image/webp,image/gif">
              <div class="cropper-panel" id="cropperPanel">
                <div class="cropper-main" id="cropperMain">
                  <canvas id="cropperCanvas"></canvas>
                </div>
                <div class="cropper-actions">
                  <span class="cropper-hint">拖拽移动 · 滚轮缩放</span>
                  <button class="btn btn--gold btn--sm" id="cropperCropBtn" type="button">确认裁剪</button>
                  <button class="btn btn--ghost btn--sm" id="cropperCancelBtn" type="button">取消</button>
                </div>
              </div>
              <span class="cover-upload-status" id="coverUploadStatus"></span>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <span class="form-label"><span class="required">*</span> 标题</span>
            <input class="input" id="formTitle" value="${escAttr(title)}" placeholder="资源标题">
          </div>
          <div class="form-group">
            <span class="form-label">作者</span>
            <input class="input" id="formAuthor" value="${escAttr(author)}" placeholder="作者名称（选填）">
          </div>
        </div>
        <div class="form-group full">
          <span class="form-label">内容标签 <span class="form-hint">— 可选，Enter 添加</span></span>
          <div class="chip-input-wrap" id="chipContentTags">
            ${cTags.map(t=>`<span class="chip" data-tag="${escAttr(t)}">${escHtml(t)}<button class="chip-remove">&times;</button></span>`).join('')}
            <input class="chip-input" placeholder="输入标签…">
          </div>
        </div>
        <div class="form-group full">
          <span class="form-label">风味标签 <span class="form-hint">— 可选，Enter 添加</span></span>
          <div class="chip-input-wrap" id="chipFlavorTags">
            ${fTags.map(t=>`<span class="chip" data-tag="${escAttr(t)}">${escHtml(t)}<button class="chip-remove">&times;</button></span>`).join('')}
            <input class="chip-input" placeholder="输入标签…">
          </div>
        </div>
        <div class="form-group">
          <span class="form-label">推荐值</span>
          <input class="input" id="formRecValue" type="number" min="0" value="${recVal}" placeholder="0">
        </div>
        <div class="form-group">
          <span class="form-label"><span class="required">*</span> 跳转链接</span>
          <input class="input" id="formTargetUrl" value="${escAttr(targetUrl)}" placeholder="https://…">
        </div>
        <div class="form-group full">
          <span class="form-label">简介 <span class="form-hint">— 可选，悬停卡片时显示</span></span>
          <textarea class="textarea" id="formSummary" placeholder="简介…">${escHtml(summary)}</textarea>
        </div>`;

      bindChipInput('chipContentTags');
      bindChipInput('chipFlavorTags');

      // ── 裁剪器 ──
      const cropperPanel = $('#cropperPanel');
      const cropperCanvas = $('#cropperCanvas');
      const cropperCtx = cropperCanvas.getContext('2d');
      const cropperMain = $('#cropperMain');
      const coverUploadStatus = $('#coverUploadStatus');

      const OUT_W = 600, OUT_H = 800;
      const CANVAS_W = 360, CANVAS_H = 480;

      cropperCanvas.width = CANVAS_W;
      cropperCanvas.height = CANVAS_H;

      let cropImg = null;
      let cropScale = 1;
      let cropIW = 0, cropIH = 0, cropOX = 0, cropOY = 0;
      let cropX = 0, cropY = 0, cropW = 0, cropH = 0;
      let dragging = false;
      let dragStartX = 0, dragStartY = 0, dragStartCX = 0, dragStartCY = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function applyZoom(ratio, cx, cy) {
        // ratio: >1 放大, <1 缩小. (cx,cy) 为缩放中心点
        const newH = clamp(cropH * ratio, 60, cropIH);
        const newW = newH * 0.75;
        const kx = (cx !== undefined ? cx : cropX + cropW/2);
        const ky = (cy !== undefined ? cy : cropY + cropH/2);
        const scale = newW / cropW;
        cropW = newW; cropH = newH;
        cropX = clamp(kx - (kx - cropX) * scale, cropOX, cropOX + cropIW - cropW);
        cropY = clamp(ky - (ky - cropY) * scale, cropOY, cropOY + cropIH - cropH);
        drawCropper();
      }

      function drawCropper() {
        if (!cropImg) return;
        const ctx = cropperCtx;
        const cw = CANVAS_W, ch = CANVAS_H;
        ctx.clearRect(0, 0, cw, ch);
        ctx.drawImage(cropImg, cropOX, cropOY, cropIW, cropIH);
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, cw, ch);
        ctx.save();
        ctx.beginPath();
        ctx.rect(cropX, cropY, cropW, cropH);
        ctx.clip();
        ctx.clearRect(0, 0, cw, ch);
        ctx.drawImage(cropImg, cropOX, cropOY, cropIW, cropIH);
        ctx.restore();
        ctx.strokeStyle = '#ddc078';
        ctx.lineWidth = 2;
        ctx.strokeRect(cropX, cropY, cropW, cropH);
        const cs = 8;
        ctx.fillStyle = '#ddc078';
        [[cropX,cropY],[cropX+cropW-cs,cropY],[cropX,cropY+cropH-cs],[cropX+cropW-cs,cropY+cropH-cs]]
          .forEach(([cx,cy]) => ctx.fillRect(cx, cy, cs, cs));
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(cropX + cropW/3, cropY); ctx.lineTo(cropX + cropW/3, cropY + cropH);
        ctx.moveTo(cropX + cropW*2/3, cropY); ctx.lineTo(cropX + cropW*2/3, cropY + cropH);
        ctx.moveTo(cropX, cropY + cropH/3); ctx.lineTo(cropX + cropW, cropY + cropH/3);
        ctx.moveTo(cropX, cropY + cropH*2/3); ctx.lineTo(cropX + cropW, cropY + cropH*2/3);
        ctx.stroke();
      }

      function initCropBox() {
        // 初始裁剪框：90% 图片高度，居中
        cropH = cropIH * 0.9;
        cropW = cropH * 0.75;
        if (cropW > cropIW) { cropW = cropIW; cropH = cropW / 0.75; }
        cropX = cropOX + (cropIW - cropW) / 2;
        cropY = cropOY + (cropIH - cropH) / 2;
        drawCropper();
      }

      function initCropper(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          cropImg = new Image();
          cropImg.onload = () => {
            const scaleW = CANVAS_W / cropImg.width;
            const scaleH = CANVAS_H / cropImg.height;
            cropScale = Math.min(scaleW, scaleH);
            cropIW = cropImg.width * cropScale;
            cropIH = cropImg.height * cropScale;
            cropOX = (CANVAS_W - cropIW) / 2;
            cropOY = (CANVAS_H - cropIH) / 2;
            initCropBox();
            cropperPanel.classList.add('active');
          };
          cropImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // 选择文件
      $('#coverFileInput').addEventListener('change', () => {
        const file = $('#coverFileInput').files[0];
        if (file) initCropper(file);
      });

      // 滚轮缩放
      cropperMain.addEventListener('wheel', (e) => {
        if (!cropImg) return;
        e.preventDefault();
        const rect = cropperMain.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        const my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        applyZoom(e.deltaY < 0 ? 1.1 : 0.9, mx, my);
      }, { passive: false });

      // 拖拽
      cropperMain.addEventListener('mousedown', (e) => {
        if (!cropImg) return;
        const rect = cropperMain.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        const my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        if (mx >= cropX && mx <= cropX + cropW && my >= cropY && my <= cropY + cropH) {
          dragging = true;
          dragStartX = mx; dragStartY = my;
          dragStartCX = cropX; dragStartCY = cropY;
          e.preventDefault();
        }
      });
      window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const rect = cropperMain.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
        const my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
        cropX = clamp(dragStartCX + (mx - dragStartX), cropOX, cropOX + cropIW - cropW);
        cropY = clamp(dragStartCY + (my - dragStartY), cropOY, cropOY + cropIH - cropH);
        drawCropper();
      });
      window.addEventListener('mouseup', () => { dragging = false; });

      // 确认裁剪 → 上传
      $('#cropperCropBtn').addEventListener('click', async () => {
        if (!cropImg) return;
        const outCanvas = document.createElement('canvas');
        outCanvas.width = OUT_W; outCanvas.height = OUT_H;
        const octx = outCanvas.getContext('2d');
        const sx = (cropX - cropOX) / cropScale;
        const sy = (cropY - cropOY) / cropScale;
        const sw = cropW / cropScale;
        const sh = cropH / cropScale;
        octx.drawImage(cropImg, sx, sy, sw, sh, 0, 0, OUT_W, OUT_H);

        coverUploadStatus.textContent = '上传中…';
        coverUploadStatus.className = 'cover-upload-status';
        try {
          const blob = await new Promise(resolve => outCanvas.toBlob(resolve, 'image/webp', 0.85));
          const fd = new FormData();
          fd.append('file', blob, 'cover.webp');
          const data = await api('/api/admin/covers', { method: 'POST', body: fd });
          formCoverPath = data.coverPath;
          $('#coverPreview').innerHTML = `<img src="${escAttr(formCoverPath)}" alt="封面预览">`;
          coverUploadStatus.textContent = '上传成功';
          coverUploadStatus.className = 'cover-upload-status success';
          cropImg = null;
          cropperPanel.classList.remove('active');
          $('#coverFileInput').value = '';
        } catch (err) {
          coverUploadStatus.textContent = err.message;
          coverUploadStatus.className = 'cover-upload-status error';
        }
      });

      // 取消
      $('#cropperCancelBtn').addEventListener('click', () => {
        cropImg = null;
        cropperPanel.classList.remove('active');
        $('#coverFileInput').value = '';
        cropperCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      });

      entryModal.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function closeEditor() {
      entryModal.classList.remove('visible');
      document.body.style.overflow = '';
      editingId = null; editingSubmissionId = null; formCoverPath = '';
    }

    async function saveEntry() {
      const title = $('#formTitle')?.value.trim() || '';
      const author = $('#formAuthor')?.value.trim() || '';
      const cTags = getChipVals('chipContentTags');
      const fTags = getChipVals('chipFlavorTags');
      const recVal = parseInt($('#formRecValue')?.value || '0', 10) || 0;
      const targetUrl = $('#formTargetUrl')?.value.trim() || '';
      const summary = $('#formSummary')?.value.trim() || '';

      if (!title) { showToast('标题不能为空', 'error'); return; }
      if (!targetUrl) { showToast('跳转链接不能为空', 'error'); return; }

      const body = { title, author, contentTags: cTags, flavorTags: fTags,
        recommendValue: recVal, summary, targetUrl, coverPath: formCoverPath };

      entryModalSave.disabled = true;
      try {
        if (editingId) {
          await api(`/api/admin/entries/${editingId}`, { method: 'PUT', body: JSON.stringify(body) });
          showToast('条目已更新');
        } else {
          await api('/api/admin/entries', { method: 'POST', body: JSON.stringify(body) });
          showToast('条目已创建');
        }
        closeEditor();
        await loadEntries();
      } catch (err) { showToast(err.message, 'error'); }
      finally { entryModalSave.disabled = false; }
    }

    function confirmDelete(id) {
      const entry = entries.find(e => e.id === id);
      confirmText.textContent = `确定要删除「${entry?.title || id}」吗？此操作不可恢复。`;
      pendingDeleteId = id;
      confirmOverlay.classList.add('visible');
    }

    async function doDelete() {
      if (!pendingDeleteId) return;
      try {
        if (pendingDeleteId.startsWith('sub_')) {
          await api('/api/admin/submissions/' + pendingDeleteId, { method: 'DELETE' });
          showToast('已驳回');
          submissions = submissions.filter(function (x) { return x.id !== pendingDeleteId; });
          renderSubmissionList();
          updateSubmissionBadge();
        } else {
          await api('/api/admin/entries/' + pendingDeleteId, { method: 'DELETE' });
          showToast('条目已删除');
          await loadEntries();
        }
      } catch (err) { showToast(err.message, 'error'); }
    }

    /* ── Chip 输入 ── */
    function bindChipInput(wrapId) {
      const wrap = document.getElementById(wrapId); if (!wrap) return;
      const input = wrap.querySelector('.chip-input'); if (!input) return;

      wrap.querySelectorAll('.chip-remove').forEach(b =>
        b.addEventListener('click', () => b.closest('.chip').remove()));

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const val = input.value.trim(); if (!val) return;
          if (getChipVals(wrapId).includes(val)) { input.value = ''; return; }
          const chip = document.createElement('span');
          chip.className = 'chip'; chip.dataset.tag = val;
          chip.innerHTML = `${escHtml(val)}<button class="chip-remove">&times;</button>`;
          chip.querySelector('.chip-remove').addEventListener('click', () => chip.remove());
          wrap.insertBefore(chip, input);
          input.value = '';
        }
        if (e.key === 'Backspace' && input.value === '') {
          const chips = wrap.querySelectorAll('.chip');
          if (chips.length) chips[chips.length-1].remove();
        }
      });
      wrap.addEventListener('click', (e) => { if (e.target === wrap) input.focus(); });
    }

    function getChipVals(wrapId) {
      const wrap = document.getElementById(wrapId);
      return wrap ? [...wrap.querySelectorAll('.chip')].map(c => c.dataset.tag).filter(Boolean) : [];
    }

    /* ── 事件 ── */
    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    logoutBtn.addEventListener('click', async () => {
      try { await api('/api/admin/logout', { method: 'POST' }); } catch {}
      window.location.href = API_BASE + '/the-great-vault/';
    });

    newEntryBtn.addEventListener('click', () => openEditor(null));

    // 导出 JSON
    $('#exportBtn').addEventListener('click', async () => {
      try {
        const data = await api('/api/admin/entries');
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'entries_backup_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) { alert('导出失败: ' + e.message); }
    });

    // 导入 JSON
    const importFileInput = $('#importFile');
    $('#importBtn').addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', async () => {
      const file = importFileInput.files[0];
      if (!file) return;
      if (!confirm(`确定要用 "${file.name}" 替换全部条目吗？此操作不可撤销。`)) {
        importFileInput.value = '';
        return;
      }
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const entries = data.entries || data;
        if (!Array.isArray(entries)) throw new Error('JSON 格式不正确：需要 entries 数组');
        const result = await api('/api/admin/entries/import', {
          method: 'POST',
          body: JSON.stringify({ entries }),
        });
        alert(`导入成功，共 ${result.imported} 个条目`);
        importFileInput.value = '';
        await loadEntries();
      } catch (e) { alert('导入失败: ' + e.message); importFileInput.value = ''; }
    });

    entryModalClose.addEventListener('click', closeEditor);
    entryModalCancel.addEventListener('click', closeEditor);
    entryModal.addEventListener('click', (e) => { if (e.target === entryModal) closeEditor(); });
    entryModalSave.addEventListener('click', saveEntry);

    confirmCancel.addEventListener('click', () => { confirmOverlay.classList.remove('visible'); pendingDeleteId = null; });
    confirmOk.addEventListener('click', async () => {
      confirmOverlay.classList.remove('visible');
      await doDelete();
      pendingDeleteId = null;
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (entryModal.classList.contains('visible')) closeEditor();
        if (confirmOverlay.classList.contains('visible')) {
          confirmOverlay.classList.remove('visible');
          pendingDeleteId = null;
        }
      }
    });

    function escHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
    function escAttr(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function init() {
      const authed = await checkSession();
      if (authed) await showDashboard();
      else loginScreen.classList.remove('hidden');
    }
    init();
  })();
  </script>
</body>
