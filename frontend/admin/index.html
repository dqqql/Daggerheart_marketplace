<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宏伟宝库 · 管理端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       Design Tokens — Dark Theme (default)
       ══════════════════════════════════════════ */
    :root {
      --bg-deepest: #151310;
      --bg-deep: #1c1a16;
      --bg-surface: #24211c;
      --bg-elevated: #2d2922;
      --bg-highlight: #37312a;
      --bg-input: #1d1a16;

      --gold: #b89342;
      --gold-light: #c9a54e;
      --gold-bright: #ddc078;
      --gold-dim: #6b5a32;
      --gold-dark: #3d3018;

      --crimson: #843434;
      --crimson-light: #a84444;
      --danger: #b84040;
      --danger-hover: #d45050;

      --text-primary: #cec4b0;
      --text-secondary: #a29684;
      --text-muted: #969080;
      --text-dim: #716856;

      --border-subtle: rgba(255,255,255,0.04);
      --border-input: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.08);
      --border-medium: rgba(255,255,255,0.12);
      --border-gold: rgba(184,147,66,0.1);
      --border-gold-strong: rgba(184,147,66,0.15);
      --border-danger: rgba(184,64,64,0.2);
      --overlay-bg: rgba(0,0,0,0.55);
      --divider: rgba(255,255,255,0.05);

      --font-display: 'Cinzel', 'Noto Serif SC', 'Source Han Serif SC', serif;
      --font-body: 'Noto Serif SC', 'Source Han Serif SC', 'STSong', 'SimSun', system-ui, sans-serif;

      --radius-sm: 3px;
      --radius-md: 6px;
      --radius-lg: 10px;

      --transition-fast: 0.15s ease;
      --transition-base: 0.25s ease;
    }

    /* ══════════════════════════════════════════
       Light Theme
       ══════════════════════════════════════════ */
    [data-theme="light"] {
      --bg-deepest: #e5e0d7;
      --bg-deep: #dbd5ca;
      --bg-surface: #ece7dc;
      --bg-elevated: #e3ded4;
      --bg-highlight: #dad4c8;
      --bg-input: #e2ddd2;

      --gold: #9a6e22;
      --gold-light: #b08028;
      --gold-bright: #c09030;
      --gold-dim: #8a6e30;
      --gold-dark: #ddd0a8;

      --crimson: #8a3030;
      --crimson-light: #a04040;
      --danger: #b04040;
      --danger-hover: #c85050;

      --text-primary: #3c3020;
      --text-secondary: #5a4a32;
      --text-muted: #726452;
      --text-dim: #8c7a64;

      --border-subtle: rgba(0,0,0,0.06);
      --border-input: rgba(0,0,0,0.10);
      --border-hover: rgba(0,0,0,0.12);
      --border-medium: rgba(0,0,0,0.15);
      --border-gold: rgba(154,110,34,0.12);
      --border-gold-strong: rgba(154,110,34,0.2);
      --border-danger: rgba(180,60,60,0.2);
      --overlay-bg: rgba(0,0,0,0.2);
      --divider: rgba(0,0,0,0.08);
    }

    /* ══════════════════════════════════════════
       Reset
       ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg-deepest);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      transition: opacity 0.5s ease;
    }
    [data-theme="light"] body::before { opacity: 0.018; }

    /* ══════════════════════════════════════════
       Login Screen
       ══════════════════════════════════════════ */
    .login-screen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-deepest);
    }
    .login-screen.hidden { display: none; }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 380px; max-width: 90vw;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }
    [data-theme="light"] .login-card { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .login-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.7; }
    .login-title {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 600;
      color: var(--gold-light);
      letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .login-error { font-size: 12px; color: var(--danger); margin-bottom: 14px; min-height: 18px; }

    .field { margin-bottom: 16px; text-align: left; }
    .field-label {
      display: block;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em; margin-bottom: 6px;
      font-family: var(--font-display); text-transform: uppercase;
    }

    .input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-family: var(--font-body); font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .input::placeholder { color: var(--text-dim); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px 22px;
      border-radius: var(--radius-md);
      font-family: var(--font-body); font-size: 13px;
      cursor: pointer;
      transition: all var(--transition-fast);
      border: 1px solid transparent;
      letter-spacing: 0.03em;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn--gold {
      background: linear-gradient(to bottom, rgba(184,147,66,0.2), rgba(184,147,66,0.1));
      color: var(--gold-light);
      border-color: rgba(184,147,66,0.3);
    }
    .btn--gold:hover {
      background: linear-gradient(to bottom, rgba(184,147,66,0.3), rgba(184,147,66,0.18));
      border-color: var(--gold);
    }
    .btn--gold:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn--ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border-hover);
    }
    .btn--ghost:hover { color: var(--text-primary); border-color: var(--border-medium); }
    .btn--danger {
      background: rgba(184,64,64,0.1);
      color: var(--danger);
      border-color: var(--border-danger);
    }
    .btn--danger:hover { background: rgba(184,64,64,0.2); border-color: var(--danger-hover); color: var(--danger-hover); }
    .btn--sm { padding: 5px 12px; font-size: 12px; }
    .btn-block { width: 100%; }

    /* 主题切换按钮 */
    .theme-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      background: var(--bg-input);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition-fast);
      flex-shrink: 0;
      line-height: 1;
    }
    .theme-toggle:hover { border-color: var(--gold-dim); color: var(--gold-light); }
    .theme-toggle:active { transform: scale(0.92); }

    /* ══════════════════════════════════════════
       Dashboard
       ══════════════════════════════════════════ */
    .dashboard {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .dashboard.hidden { display: none; }

    .dash-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--divider);
    }
    .dash-title {
      font-family: var(--font-display);
      font-size: 18px; color: var(--gold-light);
      letter-spacing: 0.06em;
    }
    .dash-actions { display: flex; gap: 10px; align-items: center; }

    .entry-list { display: flex; flex-direction: column; gap: 8px; }
    .entry-list-header {
      display: grid;
      grid-template-columns: 60px 1fr 140px 200px 120px;
      gap: 12px; padding: 10px 16px;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em;
      font-family: var(--font-display); text-transform: uppercase;
    }
    .entry-row {
      display: grid;
      grid-template-columns: 60px 1fr 140px 200px 120px;
      gap: 12px; align-items: center;
      padding: 10px 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .entry-row:hover {
      border-color: rgba(184,147,66,0.12);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    [data-theme="light"] .entry-row:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .entry-row-cover {
      width: 44px; height: 58px;
      border-radius: 2px; overflow: hidden;
      background: var(--bg-deep);
      flex-shrink: 0;
    }
    .entry-row-cover img { width: 100%; height: 100%; object-fit: cover; }
    .entry-row-cover .no-cover {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text-dim);
    }
    .entry-row-title {
      font-weight: 600; font-size: 14px; color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-row-author { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .entry-row-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .entry-row-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 2px;
      background: rgba(184,147,66,0.08);
      color: var(--gold-light);
      border: 1px solid rgba(184,147,66,0.12);
    }
    .entry-row-rec { font-size: 11px; color: var(--crimson-light); font-family: var(--font-display); }
    .entry-row-rec.yes { color: var(--gold-light); }
    .entry-row-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .entry-row-link { display: flex; align-items: center; min-width: 0; }
    .entry-row-link .btn { max-width: 100%; }
    .published-row {
      grid-template-columns: 60px 1fr 140px 120px 150px 170px;
    }
    .entry-row-time {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .review-row {
      grid-template-columns: 90px 1fr 180px 180px 120px;
    }
    .review-status {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      border: 1px solid var(--border-hover);
      background: var(--bg-input);
    }
    .review-status--approved {
      color: var(--gold-bright);
      border-color: var(--border-gold-strong);
      background: rgba(184,147,66,0.08);
    }
    .review-status--rejected {
      color: var(--danger-hover);
      border-color: var(--border-danger);
      background: rgba(184,64,64,0.08);
    }
    .review-status--neutral {
      color: var(--text-secondary);
      border-color: var(--border-hover);
      background: var(--bg-input);
    }
    .history-filter {
      width: 100%;
      min-width: 0;
      padding: 5px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: var(--bg-input);
      color: var(--text-secondary);
      font-size: 12px;
    }
    .review-note {
      font-size: 12px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .review-meta-line {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-list { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; }

    .loading-spin { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .loading-spin::before {
      content: '';
      display: inline-block;
      width: 24px; height: 24px;
      border: 2px solid var(--text-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════
       Form Modal
       ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--overlay-bg);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 40px;
      overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-gold-strong);
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 64px rgba(0,0,0,0.7);
      width: 600px; max-width: 94vw;
      margin-bottom: 60px;
      transform: translateY(8px);
      transition: transform 0.3s ease;
    }
    [data-theme="light"] .modal { box-shadow: 0 12px 48px rgba(0,0,0,0.12); }
    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--divider);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 16px; letter-spacing: 0.04em;
    }
    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 22px;
      cursor: pointer; padding: 2px 8px; border-radius: var(--radius-sm);
      transition: color var(--transition-fast); line-height: 1;
    }
    .modal-close:hover { color: var(--text-primary); }

    .modal-body {
      padding: 24px;
      display: flex; flex-direction: column; gap: 18px;
      max-height: 70vh; overflow-y: auto;
    }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding: 14px 24px;
      border-top: 1px solid var(--divider);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-label {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.06em;
      font-family: var(--font-display);
    }
    .form-label .required { color: var(--crimson-light); }

    .textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 9px 12px;
      font-family: var(--font-body); font-size: 13px;
      color: var(--text-primary);
      outline: none; resize: vertical; min-height: 70px; line-height: 1.5;
      transition: border-color var(--transition-fast);
    }
    .textarea:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .form-hint { font-size: 11px; color: var(--text-dim); }

    /* Chip 输入 */
    .chip-input-wrap {
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 6px 8px;
      min-height: 40px;
      cursor: text;
      transition: border-color var(--transition-fast);
    }
    .chip-input-wrap:focus-within {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(184,147,66,0.06);
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(184,147,66,0.1);
      border: 1px solid rgba(184,147,66,0.18);
      border-radius: 14px;
      padding: 2px 10px;
      font-size: 12px; color: var(--gold-light);
      animation: chipPop 0.15s ease;
    }
    .chip-remove {
      background: none; border: none;
      color: var(--gold-dim); font-size: 14px;
      cursor: pointer; padding: 0; line-height: 1;
      transition: color var(--transition-fast);
    }
    .chip-remove:hover { color: var(--crimson-light); }
    .chip-input {
      flex: 1; min-width: 80px;
      background: transparent; border: none; outline: none;
      font-family: var(--font-body); font-size: 13px;
      color: var(--text-primary);
      padding: 3px 4px;
    }
    .chip-input::placeholder { color: var(--text-dim); font-size: 12px; }

    @keyframes chipPop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* 封面上传 */
    .cover-upload-area { display: flex; gap: 16px; align-items: flex-start; }
    .cover-preview {
      width: 100px; height: 133px;
      border-radius: var(--radius-sm);
      background: var(--bg-deep);
      border: 1px dashed var(--border-hover);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
    .cover-preview-placeholder { font-size: 28px; color: var(--text-dim); }
    .cover-upload-controls { display: flex; flex-direction: column; gap: 8px; }
    .cover-upload-controls .input[type="file"] { font-size: 12px; padding: 6px; }
    .cover-upload-status { font-size: 11px; color: var(--text-muted); }
    .cover-upload-status.success { color: #6a9; }
    .cover-upload-status.error { color: var(--danger); }

    /* 裁剪器 */
    .cropper-panel {
      display: none;
      margin-top: 10px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .cropper-panel.active { display: flex; }
    .cropper-main {
      position: relative;
      width: 360px; height: 480px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: move;
      user-select: none;
      background: var(--bg-deep);
      flex-shrink: 0;
      line-height: 0;
    }
    .cropper-main canvas { display: block; width: 100%; height: 100%; }
    .cropper-actions {
      display: flex; gap: 8px; align-items: center;
    }
    .cropper-hint {
      font-size: 11px; color: var(--text-dim);
      flex: 1;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-elevated);
      border: 1px solid rgba(184,147,66,0.2);
      border-radius: var(--radius-md);
      padding: 10px 20px;
      font-size: 13px; color: var(--text-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: all 0.3s ease;
    }
    [data-theme="light"] .toast { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--border-danger); color: var(--danger-hover); }

    /* 确认对话框 */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .confirm-overlay.visible { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-danger);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    [data-theme="light"] .confirm-box { box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .confirm-text { font-size: 14px; margin-bottom: 20px; color: var(--text-primary); }
    .confirm-actions { display: flex; justify-content: center; gap: 10px; }

    .review-overlay {
      position: fixed; inset: 0; z-index: 250;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .review-overlay.visible { opacity: 1; pointer-events: all; }
    .review-box {
      width: 480px; max-width: 92vw;
      background: var(--bg-surface);
      border: 1px solid var(--border-danger);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    [data-theme="light"] .review-box { box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    .review-title {
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--danger-hover);
      margin-bottom: 8px;
    }
    .review-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .review-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

    /* ══════════════════════════════════════════
       Scrollbar
       ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ══════════════════════════════════════════
       Tabs
       ══════════════════════════════════════════ */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border-medium);
      padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); font-family: var(--font-body);
      font-size: 14px; cursor: pointer;
      transition: all var(--transition-fast);
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active {
      color: var(--gold); border-bottom-color: var(--gold);
    }
    .tab-badge {
      display: inline-block; margin-left: 6px;
      padding: 1px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
      background: var(--gold-dark); color: var(--gold-bright);
    }
    .tab-badge.zero { background: transparent; color: var(--text-muted); }
    .submission-list, .review-list { display: none; }
    .submission-list.visible, .review-list.visible { display: flex; }

    /* ── 操作按钮 ── */
    .action-btn-group { display: flex; gap: 6px; }
    .btn--success {
      background: var(--gold-dark); color: var(--gold-bright);
      border-color: var(--border-gold);
    }
    .btn--success:hover { background: var(--gold-dim); }
  </style>
</head>
<body>

  <!-- 登录页 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon" aria-hidden="true">&#9876;</div>
      <div class="login-title">宏伟宝库 · 管理端</div>
      <div class="login-subtitle">管理入口 — 输入口令以继续</div>
      <div class="login-error" id="loginError"></div>
      <div class="field">
        <label class="field-label" for="passwordInput">访问口令</label>
        <input type="password" id="passwordInput" class="input" placeholder="输入管理口令…" autocomplete="current-password">
      </div>
      <button class="btn btn--gold btn-block" id="loginBtn">进入管理</button>
    </div>
  </div>

  <!-- 管理面板 -->
  <div class="dashboard hidden" id="dashboard">
    <header class="dash-header">
      <span class="dash-title">&#9876; 条目管理</span>
      <div class="dash-actions">
        <button class="btn btn--ghost" id="exportBtn">导出 JSON</button>
        <button class="btn btn--ghost" id="importBtn">导入 JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
        <button class="btn btn--gold" id="newEntryBtn">+ 新建条目</button>
        <button class="btn btn--ghost" id="logoutBtn">退出</button>
        <button class="theme-toggle" id="themeToggle" aria-label="切换亮色/暗色主题" title="切换主题">&#9788;</button>
      </div>
    </header>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" id="tabEntries">已发布 <span class="tab-badge zero" id="entryBadge">0</span></button>
      <button class="tab-btn" id="tabSubmissions">待审核 <span class="tab-badge zero" id="submissionBadge">0</span></button>
      <button class="tab-btn" id="tabReviews">历史 <span class="tab-badge zero" id="reviewBadge">0</span></button>
    </div>

    <div class="entry-list-header published-row" id="entryListHeader">
      <span>封面</span><span>标题 / 作者</span><span>标签</span><span>链接</span><span>最后修改时间</span><span style="text-align:right">操作</span>
    </div>
    <div class="entry-list" id="entryList">
      <div class="loading-spin">加载条目数据…</div>
    </div>

    <div class="entry-list-header" id="submissionListHeader" style="display:none">
      <span>封面</span><span>标题 / 作者</span><span>标签</span><span>链接</span><span style="text-align:right">操作</span>
    </div>
    <div class="entry-list submission-list" id="submissionList">
      <div class="loading-spin">加载投稿数据…</div>
    </div>

    <div class="entry-list-header review-row" id="reviewListHeader" style="display:none">
      <span>
        <select class="history-filter" id="reviewTypeFilter" aria-label="历史类型筛选">
          <option value="all">全部记录</option>
          <option value="submission_created">投稿新建</option>
          <option value="submission_updated">投稿编辑</option>
          <option value="approved">通过</option>
          <option value="rejected">投稿驳回</option>
          <option value="entry_created">资源新建</option>
          <option value="entry_updated">资源编辑</option>
          <option value="entry_rejected">资源驳回</option>
          <option value="entry_deleted">资源删除</option>
          <option value="entries_imported">批量导入</option>
        </select>
      </span><span>标题 / 投稿者</span><span>审阅</span><span>链接</span><span style="text-align:right">时间</span>
    </div>
    <div class="entry-list review-list" id="reviewList">
      <div class="loading-spin">加载历史记录…</div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="entryModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="entryModalTitle">新建条目</span>
        <button class="modal-close" id="entryModalClose">&times;</button>
      </div>
      <div class="modal-body" id="entryModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="entryModalCancel">取消</button>
        <button class="btn btn--gold" id="entryModalSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认删除 -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-text" id="confirmText">确定要删除此条目吗？此操作不可恢复。</div>
      <div class="confirm-actions">
        <button class="btn btn--ghost" id="confirmCancel">取消</button>
        <button class="btn btn--danger" id="confirmOk">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 驳回审阅意见 -->
  <div class="review-overlay" id="rejectOverlay">
    <div class="review-box">
      <div class="review-title" id="rejectTitle">驳回投稿</div>
      <div class="review-meta" id="rejectMeta"></div>
      <div class="field">
        <label class="field-label" for="rejectNote">审阅意见</label>
        <textarea class="textarea" id="rejectNote" placeholder="写给投稿者的修改意见…"></textarea>
      </div>
      <div class="review-actions">
        <button class="btn btn--ghost" id="rejectCancel">取消</button>
        <button class="btn btn--danger" id="rejectOk">确认驳回</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/assets/resource-form.js"></script>
  <script>
  (function () {
    'use strict';

    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:5000' : '';

    /* ── 主题管理 ── */
    const THEME_KEY = 'dh-marketplace-theme'; // 与前台共享

    function getSavedTheme() { try { return localStorage.getItem(THEME_KEY); } catch { return null; } }
    function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch {} }
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.innerHTML = t === 'light' ? '&#9790;' : '&#9788;';
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      applyTheme(next); saveTheme(next);
    }
    (function initTheme() {
      const saved = getSavedTheme();
      if (saved) applyTheme(saved);
      document.getElementById('themeToggle')?.addEventListener('click', toggleTheme);
    })();

    /* ── DOM ── */
    const $ = (s) => document.querySelector(s);

    const loginScreen = $('#loginScreen');
    const dashboard = $('#dashboard');
    const loginError = $('#loginError');
    const passwordInput = $('#passwordInput');
    const loginBtn = $('#loginBtn');
    const entryList = $('#entryList');
    const newEntryBtn = $('#newEntryBtn');
    const logoutBtn = $('#logoutBtn');
    const entryModal = $('#entryModal');
    const entryModalTitle = $('#entryModalTitle');
    const entryModalBody = $('#entryModalBody');
    const entryModalClose = $('#entryModalClose');
    const entryModalCancel = $('#entryModalCancel');
    const entryModalSave = $('#entryModalSave');
    const confirmOverlay = $('#confirmOverlay');
    const confirmText = $('#confirmText');
    const confirmCancel = $('#confirmCancel');
    const confirmOk = $('#confirmOk');
    const rejectOverlay = $('#rejectOverlay');
    const rejectTitle = $('#rejectTitle');
    const rejectMeta = $('#rejectMeta');
    const rejectNote = $('#rejectNote');
    const rejectCancel = $('#rejectCancel');
    const rejectOk = $('#rejectOk');
    const toast = $('#toast');

    let entries = [];
    let editingId = null;
    let pendingConfirm = null;
    let pendingRejectId = null;
    let pendingRejectKind = 'submission';

    /* ── API ── */
    async function api(path, opts = {}) {
      const url = API_BASE + path;
      const res = await fetch(url, {
        credentials: 'include',
        headers: opts.body instanceof FormData
          ? {} : { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        ...opts,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg, type = '') {
      toast.textContent = msg;
      toast.className = 'toast visible ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('visible'); }, 2800);
    }

    async function checkSession() {
      try { return (await api('/api/admin/session')).authenticated === true; }
      catch { return false; }
    }

    async function doLogin() {
      const pw = passwordInput.value;
      if (!pw) { loginError.textContent = '请输入口令'; return; }
      loginBtn.disabled = true;
      loginError.textContent = '';
      try {
        await api('/api/admin/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
        showDashboard();
      } catch (err) { loginError.textContent = err.message; }
      finally { loginBtn.disabled = false; }
    }

    async function showDashboard() {
      loginScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      activeTab = 'entries';
      setTab('entries');
      await loadEntries();
      loadSubmissionCount();
      loadReviewCount();
    }

    function updateEntryBadge() {
      var n = entries.length;
      entryBadge.textContent = n;
      entryBadge.classList.toggle('zero', n === 0);
    }

    async function loadSubmissionCount() {
      try {
        var data = await api('/api/admin/submissions');
        submissions = data.submissions || [];
        updateSubmissionBadge();
      } catch (err) {
        // 静默失败——计数非关键
      }
    }

    async function loadEntries() {
      entryList.innerHTML = '<div class="loading-spin">加载条目数据…</div>';
      try {
        const data = await api('/api/admin/entries');
        entries = data.entries || [];
        renderEntryList();
      } catch (err) {
        entryList.innerHTML = `<div class="empty-list">加载失败：${escHtml(err.message)}</div>`;
      }
    }

    function renderEntryList() {
      if (!entries.length) {
        entryList.innerHTML = '<div class="empty-list">暂无条目，点击「新建条目」添加第一个资源</div>';
        return;
      }
      entries.sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
      entryList.innerHTML = entries.map(e => {
        const rec = e.recommendValue > 0;
        const thumb = e.coverPath
          ? `<img src="${escAttr(e.coverPath)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><span class="no-cover" style="display:none">&#9876;</span>`
          : '<span class="no-cover">&#9876;</span>';
        return `
        <div class="entry-row published-row">
          <div class="entry-row-cover">${thumb}</div>
          <div>
            <div class="entry-row-title">${escHtml(e.title)}</div>
            <div class="entry-row-author">${escHtml(e.author)} ${rec?'<span class="entry-row-rec yes">&#9733; 推荐</span>':''}</div>
          </div>
          <div class="entry-row-tags">
            ${(e.contentTags||[]).slice(0,3).map(t=>`<span class="entry-row-tag">${escHtml(t)}</span>`).join('')}
            ${(e.contentTags||[]).length>3?`<span class="entry-row-tag">+${e.contentTags.length-3}</span>`:''}
          </div>
          <div class="entry-row-link">
            <a class="btn btn--ghost btn--sm" href="${escAttr(e.targetUrl)}" target="_blank" rel="noopener noreferrer" title="${escAttr(e.targetUrl)}">跳转</a>
          </div>
          <div class="entry-row-time" title="${escAttr(e.updatedAt || e.createdAt || '')}">${escHtml(formatDateTime(e.updatedAt || e.createdAt || ''))}</div>
          <div class="entry-row-actions">
            <button class="btn btn--ghost btn--sm edit-btn" data-id="${escAttr(e.id)}">编辑</button>
            <button class="btn btn--ghost btn--sm entry-reject-btn" data-id="${escAttr(e.id)}">驳回</button>
            <button class="btn btn--danger btn--sm delete-btn" data-id="${escAttr(e.id)}">删除</button>
          </div>
        </div>`;
      }).join('');

      entryList.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => openEditor(b.dataset.id)));
      entryList.querySelectorAll('.entry-reject-btn').forEach(b => b.addEventListener('click', () => rejectPublishedEntry(b.dataset.id)));
      entryList.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', () => confirmDelete(b.dataset.id)));
      updateEntryBadge();
    }

    /* ── 审核系统 ── */
    const tabEntries = document.getElementById('tabEntries');
    const tabSubmissions = document.getElementById('tabSubmissions');
    const tabReviews = document.getElementById('tabReviews');
    const entryBadge = document.getElementById('entryBadge');
    const submissionBadge = document.getElementById('submissionBadge');
    const reviewBadge = document.getElementById('reviewBadge');
    const submissionListEl = document.getElementById('submissionList');
    const reviewListEl = document.getElementById('reviewList');
    const submissionListHeader = document.getElementById('submissionListHeader');
    const reviewListHeader = document.getElementById('reviewListHeader');
    const reviewTypeFilter = document.getElementById('reviewTypeFilter');
    const entryListHeader = document.getElementById('entryListHeader');

    let submissions = [];
    let reviews = [];
    let activeTab = 'entries';        // 'entries' | 'submissions' | 'reviews'
    let activeReviewType = 'all';
    let currentEditor = null;
    let resourceForm = null;
    const REVIEW_LABELS = {
      submission_created: '投稿新建',
      submission_updated: '投稿编辑',
      approved: '已通过',
      rejected: '投稿驳回',
      entry_created: '资源新建',
      entry_updated: '资源编辑',
      entry_deleted: '资源删除',
      entry_rejected: '资源驳回',
      entries_imported: '批量导入'
    };

    function setTab(tab) {
      activeTab = tab;
      if (tab === 'entries') {
        tabEntries.classList.add('active');
        tabSubmissions.classList.remove('active');
        tabReviews.classList.remove('active');
        entryListHeader.style.display = '';
        entryList.style.display = '';
        submissionListHeader.style.display = 'none';
        reviewListHeader.style.display = 'none';
        submissionListEl.classList.remove('visible');
        reviewListEl.classList.remove('visible');
      } else if (tab === 'submissions') {
        tabEntries.classList.remove('active');
        tabSubmissions.classList.add('active');
        tabReviews.classList.remove('active');
        entryListHeader.style.display = 'none';
        entryList.style.display = 'none';
        submissionListHeader.style.display = '';
        reviewListHeader.style.display = 'none';
        submissionListEl.classList.add('visible');
        reviewListEl.classList.remove('visible');
        loadSubmissions();
      } else {
        tabEntries.classList.remove('active');
        tabSubmissions.classList.remove('active');
        tabReviews.classList.add('active');
        entryListHeader.style.display = 'none';
        entryList.style.display = 'none';
        submissionListHeader.style.display = 'none';
        reviewListHeader.style.display = '';
        submissionListEl.classList.remove('visible');
        reviewListEl.classList.add('visible');
        loadSubmissionReviews();
      }
    }

    tabEntries.addEventListener('click', function () { setTab('entries'); });
    tabSubmissions.addEventListener('click', function () { setTab('submissions'); });
    tabReviews.addEventListener('click', function () { setTab('reviews'); });
    reviewTypeFilter.addEventListener('change', function () {
      activeReviewType = reviewTypeFilter.value || 'all';
      renderReviewList();
    });

    function updateSubmissionBadge() {
      var n = submissions.length;
      submissionBadge.textContent = n;
      if (n === 0) {
        submissionBadge.classList.add('zero');
      } else {
        submissionBadge.classList.remove('zero');
      }
    }

    function updateReviewBadge() {
      var n = reviews.length;
      reviewBadge.textContent = n;
      if (n === 0) {
        reviewBadge.classList.add('zero');
      } else {
        reviewBadge.classList.remove('zero');
      }
    }

    async function loadReviewCount() {
      try {
        var data = await api('/api/admin/submission-reviews');
        reviews = data.reviews || [];
        updateReviewBadge();
      } catch (err) {
        // 静默失败——计数非关键
      }
    }

    async function loadSubmissions() {
      submissionListEl.innerHTML = '<div class="loading-spin">加载投稿数据…</div>';
      try {
        var data = await api('/api/admin/submissions');
        submissions = data.submissions || [];
        renderSubmissionList();
        updateSubmissionBadge();
      } catch (err) {
        submissionListEl.innerHTML = '<div class="empty-list">加载失败：' + escHtml(err.message) + '</div>';
      }
    }

    function renderSubmissionList() {
      if (!submissions.length) {
        submissionListEl.innerHTML = '<div class="empty-list">暂无待审核的投稿</div>';
        return;
      }
      submissions.sort(function (a, b) { return (b.createdAt || '').localeCompare(a.createdAt || ''); });
      submissionListEl.innerHTML = submissions.map(function (s) {
        var thumb = s.coverPath
          ? '<img src="' + escAttr(s.coverPath) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><span class="no-cover" style="display:none">&#9876;</span>'
          : '<span class="no-cover">&#9876;</span>';
        return '<div class="entry-row">'
          + '<div class="entry-row-cover">' + thumb + '</div>'
          + '<div><div class="entry-row-title">' + escHtml(s.title) + '</div>'
          + '<div class="entry-row-author">' + escHtml(s.author) + '</div>'
          + '<div class="entry-row-author">' + (s.feedbackEmail ? '反馈：' + escHtml(s.feedbackEmail) : '未留反馈邮箱') + '</div></div>'
          + '<div class="entry-row-tags">'
          + (s.contentTags || []).slice(0, 3).map(function (t) { return '<span class="entry-row-tag">' + escHtml(t) + '</span>'; }).join('')
          + ((s.contentTags || []).length > 3 ? '<span class="entry-row-tag">+' + (s.contentTags.length - 3) + '</span>' : '')
          + '</div>'
          + '<div class="entry-row-link">'
          + '<a class="btn btn--ghost btn--sm" href="' + escAttr(s.targetUrl) + '" target="_blank" rel="noopener noreferrer" title="' + escAttr(s.targetUrl) + '">跳转</a>'
          + '</div>'
          + '<div class="entry-row-actions">'
          + '<div class="action-btn-group">'
          + '<button class="btn btn--ghost btn--sm sub-edit-btn" data-id="' + escAttr(s.id) + '">编辑</button>'
          + '<button class="btn btn--success btn--sm sub-approve-btn" data-id="' + escAttr(s.id) + '">通过</button>'
          + '<button class="btn btn--danger btn--sm sub-reject-btn" data-id="' + escAttr(s.id) + '">驳回</button>'
          + '</div></div>'
          + '</div>';
      }).join('');

      submissionListEl.querySelectorAll('.sub-edit-btn').forEach(function (b) {
        b.addEventListener('click', function () { openSubmissionEditor(b.dataset.id); });
      });
      submissionListEl.querySelectorAll('.sub-approve-btn').forEach(function (b) {
        b.addEventListener('click', function () { approveSubmission(b.dataset.id); });
      });
      submissionListEl.querySelectorAll('.sub-reject-btn').forEach(function (b) {
        b.addEventListener('click', function () { rejectSubmission(b.dataset.id); });
      });
    }

    async function loadSubmissionReviews() {
      reviewListEl.innerHTML = '<div class="loading-spin">加载历史记录…</div>';
      try {
        var data = await api('/api/admin/submission-reviews');
        reviews = data.reviews || [];
        renderReviewList();
        updateReviewBadge();
      } catch (err) {
        reviewListEl.innerHTML = '<div class="empty-list">加载失败：' + escHtml(err.message) + '</div>';
      }
    }

    function renderReviewList() {
      var visibleReviews = activeReviewType === 'all'
        ? reviews.slice()
        : reviews.filter(function (r) { return r.action === activeReviewType; });
      if (!visibleReviews.length) {
        reviewListEl.innerHTML = '<div class="empty-list">暂无历史记录</div>';
        return;
      }
      visibleReviews.sort(function (a, b) { return (b.reviewedAt || '').localeCompare(a.reviewedAt || ''); });
      reviewListEl.innerHTML = visibleReviews.map(function (r) {
        var approved = r.action === 'approved';
        var rejected = r.action === 'rejected' || r.action === 'entry_rejected' || r.action === 'entry_deleted';
        var statusClass = approved ? 'review-status--approved' : rejected ? 'review-status--rejected' : 'review-status--neutral';
        var statusText = REVIEW_LABELS[r.action] || r.action || '记录';
        var note = r.reviewNote || (approved ? '发布为条目：' + (r.entryId || '未知') : r.summary || '未填写说明');
        var contact = r.feedbackEmail ? '反馈：' + r.feedbackEmail : '未留反馈邮箱';
        var submitted = r.submittedAt ? '投稿：' + formatDateTime(r.submittedAt) : '';
        return '<div class="entry-row review-row">'
          + '<div><span class="review-status ' + statusClass + '">' + statusText + '</span></div>'
          + '<div><div class="entry-row-title">' + escHtml(r.title) + '</div>'
          + '<div class="entry-row-author">' + escHtml(r.author || '未署名') + '</div>'
          + '<div class="review-meta-line">' + escHtml(contact) + '</div></div>'
          + '<div>'
          + '<div class="review-note" title="' + escAttr(note) + '">' + escHtml(note) + '</div>'
          + '<div class="review-meta-line">' + escHtml(submitted) + '</div>'
          + '</div>'
          + '<div class="entry-row-link">'
          + (r.targetUrl ? '<a class="btn btn--ghost btn--sm" href="' + escAttr(r.targetUrl) + '" target="_blank" rel="noopener noreferrer" title="' + escAttr(r.targetUrl) + '">跳转</a>' : '')
          + '</div>'
          + '<div class="review-meta-line" style="text-align:right">' + escHtml(formatDateTime(r.reviewedAt)) + '</div>'
          + '</div>';
      }).join('');
    }

    function buildEditorConfig(mode, source) {
      if (mode === 'submission') {
        return {
          mode: mode,
          id: source.id,
          title: '编辑投稿',
          saveLabel: '保存',
          initialValues: source,
          submit: async function (payload) {
            await api('/api/admin/submissions/' + source.id, { method: 'PUT', body: JSON.stringify(payload) });
            showToast('投稿已更新');
            await loadSubmissions();
            loadReviewCount();
          }
        };
      }

      return {
        mode: mode,
        id: source ? source.id : null,
        title: source ? '编辑条目' : '新建条目',
        saveLabel: '保存',
        initialValues: source || {
          title: '',
          author: '',
          feedbackEmail: '',
          contentTags: [],
          flavorTags: [],
          recommendValue: 0,
          summary: '',
          targetUrl: '',
          coverPath: ''
        },
        submit: async function (payload) {
          if (source) {
            await api('/api/admin/entries/' + source.id, { method: 'PUT', body: JSON.stringify(payload) });
            showToast('条目已更新');
          } else {
            await api('/api/admin/entries', { method: 'POST', body: JSON.stringify(payload) });
            showToast('条目已创建');
          }
          await loadEntries();
          loadReviewCount();
        }
      };
    }

    function openResourceEditor(config) {
      currentEditor = config;
      entryModalTitle.textContent = config.title;
      entryModalSave.textContent = config.saveLabel;
      resourceForm = window.ResourceForm.create({
        bodyEl: entryModalBody,
        showRecommendValue: true,
        showFeedbackEmail: config.mode === 'submission' || config.mode === 'entry',
        initialValues: config.initialValues,
        uploadCover: async function (formData) {
          return api('/api/admin/covers', { method: 'POST', body: formData });
        },
        escHtml: escHtml,
        escAttr: escAttr
      });
      entryModal.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function openSubmissionEditor(id) {
      var submission = submissions.find(function (item) { return item.id === id; });
      if (!submission) return;
      openResourceEditor(buildEditorConfig('submission', submission));
    }

    function openConfirm(options) {
      pendingConfirm = options.onConfirm;
      confirmText.textContent = options.message;
      confirmOk.textContent = options.okText || '确认';
      confirmOk.className = 'btn ' + (options.okClass || 'btn--danger');
      confirmOverlay.classList.add('visible');
    }

    function closeConfirm() {
      confirmOverlay.classList.remove('visible');
      pendingConfirm = null;
      confirmOk.disabled = false;
      confirmOk.textContent = '确认删除';
      confirmOk.className = 'btn btn--danger';
    }

    /* ── 通过 / 驳回 ── */
    async function approveSubmission(id) {
      var s = submissions.find(function (x) { return x.id === id; });
      if (!s) return;
      openConfirm({
        message: '确定要通过「' + (s.title || id) + '」吗？通过后会发布到资源列表。',
        okText: '确认通过',
        okClass: 'btn--success',
        onConfirm: async function () {
          try {
            await api('/api/admin/submissions/' + id + '/approve', { method: 'POST' });
            showToast('已通过「' + s.title + '」');
            submissions = submissions.filter(function (x) { return x.id !== id; });
            renderSubmissionList();
            updateSubmissionBadge();
            loadReviewCount();
            // 同时刷新条目列表
            entries = [];
            await loadEntries();
          } catch (err) { showToast(err.message, 'error'); }
        }
      });
    }

    async function rejectSubmission(id) {
      var s = submissions.find(function (x) { return x.id === id; });
      if (!s) return;
      pendingRejectId = id;
      pendingRejectKind = 'submission';
      rejectTitle.textContent = '驳回「' + (s.title || id) + '」';
      rejectMeta.textContent = s.feedbackEmail
        ? '将尝试发送审阅意见到：' + s.feedbackEmail
        : '该投稿未留下反馈邮箱；驳回后不会发送邮件。';
      rejectNote.value = '';
      rejectOverlay.classList.add('visible');
      rejectNote.focus();
    }

    async function rejectPublishedEntry(id) {
      var e = entries.find(function (x) { return x.id === id; });
      if (!e) return;
      pendingRejectId = id;
      pendingRejectKind = 'entry';
      rejectTitle.textContent = '驳回已发布资源「' + (e.title || id) + '」';
      rejectMeta.textContent = e.feedbackEmail
        ? '将尝试发送复核意见到：' + e.feedbackEmail + '；确认后会删除该资源。'
        : '该资源没有留下反馈邮箱；确认后不会发送邮件，但仍会删除该资源。';
      rejectNote.value = '';
      rejectOverlay.classList.add('visible');
      rejectNote.focus();
    }

    function openEditor(id) {
      var entry = id ? entries.find(function (item) { return item.id === id; }) : null;
      openResourceEditor(buildEditorConfig('entry', entry));
    }

    function closeEditor() {
      entryModal.classList.remove('visible');
      document.body.style.overflow = '';
      editingId = null;
      currentEditor = null;
      resourceForm = null;
      entryModalSave.textContent = '保存';
      entryModalBody.innerHTML = '';
    }

    async function saveEntry() {
      if (!resourceForm || !currentEditor) return;
      var body = resourceForm.collect();

      if (!body.title) { showToast('标题不能为空', 'error'); return; }
      if (!body.targetUrl) { showToast('跳转链接不能为空', 'error'); return; }
      if (currentEditor.mode === 'submission' && !body.feedbackEmail) {
        showToast('反馈邮箱不能为空', 'error');
        return;
      }

      entryModalSave.disabled = true;
      try {
        await currentEditor.submit(body);
        closeEditor();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        entryModalSave.disabled = false;
      }
    }

    function confirmDelete(id) {
      const entry = entries.find(e => e.id === id);
      openConfirm({
        message: `确定要删除「${entry?.title || id}」吗？此操作不可恢复。`,
        okText: '确认删除',
        okClass: 'btn--danger',
        onConfirm: async function () {
          try {
            await api('/api/admin/entries/' + id, { method: 'DELETE' });
            showToast('条目已删除');
            await loadEntries();
            loadReviewCount();
          } catch (err) { showToast(err.message, 'error'); }
        }
      });
    }

    function closeRejectDialog() {
      rejectOverlay.classList.remove('visible');
      pendingRejectId = null;
      pendingRejectKind = 'submission';
      rejectNote.value = '';
    }

    function formatRejectToast(notification) {
      if (!notification || notification.status === 'sent') return '已驳回，邮件已发送';
      if (notification.status === 'skipped') {
        if (notification.reason === 'no_feedback_email') return '已驳回，未留邮箱';
        if (notification.reason === 'not_configured') return '已驳回，邮件服务未配置';
        return '已驳回，邮件已跳过';
      }
      if (notification.status === 'failed') {
        return '已驳回，邮件发送失败：' + (notification.message || '未知错误');
      }
      return '已驳回';
    }

    async function doReject() {
      if (!pendingRejectId) return;
      var id = pendingRejectId;
      var kind = pendingRejectKind;
      rejectOk.disabled = true;
      try {
        var path = kind === 'entry'
          ? '/api/admin/entries/' + id + '/reject'
          : '/api/admin/submissions/' + id;
        var method = kind === 'entry' ? 'POST' : 'DELETE';
        var result = await api(path, {
          method: method,
          body: JSON.stringify({ reviewNote: rejectNote.value.trim() })
        });
        closeRejectDialog();
        var failed = result.notification && result.notification.status === 'failed';
        showToast(formatRejectToast(result.notification), failed ? 'error' : '');
        if (kind === 'entry') {
          entries = entries.filter(function (x) { return x.id !== id; });
          renderEntryList();
          updateEntryBadge();
        } else {
          submissions = submissions.filter(function (x) { return x.id !== id; });
          renderSubmissionList();
          updateSubmissionBadge();
        }
        loadReviewCount();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        rejectOk.disabled = false;
      }
    }

    /* ── 事件 ── */
    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    logoutBtn.addEventListener('click', async () => {
      try { await api('/api/admin/logout', { method: 'POST' }); } catch {}
      window.location.href = API_BASE + '/the-great-vault/';
    });

    newEntryBtn.addEventListener('click', () => openEditor(null));

    // 导出 JSON
    $('#exportBtn').addEventListener('click', async () => {
      try {
        const data = await api('/api/admin/entries');
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'entries_backup_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) { alert('导出失败: ' + e.message); }
    });

    // 导入 JSON
    const importFileInput = $('#importFile');
    $('#importBtn').addEventListener('click', () => importFileInput.click());
    importFileInput.addEventListener('change', async () => {
      const file = importFileInput.files[0];
      if (!file) return;
      if (!confirm(`确定要用 "${file.name}" 替换全部条目吗？此操作不可撤销。`)) {
        importFileInput.value = '';
        return;
      }
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const entries = data.entries || data;
        if (!Array.isArray(entries)) throw new Error('JSON 格式不正确：需要 entries 数组');
        const result = await api('/api/admin/entries/import', {
          method: 'POST',
          body: JSON.stringify({ entries }),
        });
        alert(`导入成功，共 ${result.imported} 个条目`);
        importFileInput.value = '';
        await loadEntries();
      } catch (e) { alert('导入失败: ' + e.message); importFileInput.value = ''; }
    });

    entryModalClose.addEventListener('click', closeEditor);
    entryModalCancel.addEventListener('click', closeEditor);
    entryModalSave.addEventListener('click', saveEntry);

    confirmCancel.addEventListener('click', closeConfirm);
    confirmOk.addEventListener('click', async () => {
      var action = pendingConfirm;
      closeConfirm();
      if (action) await action();
    });
    rejectCancel.addEventListener('click', closeRejectDialog);
    rejectOk.addEventListener('click', doReject);

    function escHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(s));
      return d.innerHTML;
    }
    function escAttr(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatDateTime(value) {
      if (!value) return '';
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    async function init() {
      const authed = await checkSession();
      if (authed) await showDashboard();
      else loginScreen.classList.remove('hidden');
    }
    init();
  })();
  </script>
</body>
</html>
